openapi: 3.0.3
info:
  title: SoWhat News API
  version: 0.1.0
  description: |
    Contextual Utility News Engine — transforms the day's top headlines
    into persona-personalized impact items. Zero-PII: the server sees only
    anonymous enum-based persona selections and a hashed device token for
    rate limiting.

    **Authoritative source**: this file is generated from Zod schemas in
    `packages/shared` via `@hono/zod-openapi`. Hand edits will be lost.

servers:
  - url: https://sowhat-api.example.workers.dev
    description: Production (Cloudflare Workers)
  - url: http://localhost:8787
    description: Local dev (wrangler dev)

paths:
  /api/generate-impact:
    post:
      summary: Generate a personalized daily impact feed
      operationId: generateImpact
      parameters:
        - name: X-Device-Token
          in: header
          required: true
          description: |
            Anonymous device identifier (client-generated UUIDv4, no PII).
            Used server-side only in hashed form for rate limiting.
          schema:
            type: string
            format: uuid
            minLength: 36
            maxLength: 36
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/GenerateImpactRequest'
      responses:
        '200':
          description: Impact feed (may contain per-item fallback variants)
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/GenerateImpactResponse'
        '400':
          description: Invalid request body or missing device token
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ValidationFailedError'
        '429':
          description: Rate limit exceeded (3 requests per 24 hours)
          headers:
            Retry-After:
              schema:
                type: integer
                description: Seconds until the next request is allowed
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/RateLimitedError'
        '500':
          description: Unexpected server error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/InternalError'
        '502':
          description: Upstream dependency (news source or AI) unavailable
          content:
            application/json:
              schema:
                oneOf:
                  - $ref: '#/components/schemas/NewsUnavailableError'
                  - $ref: '#/components/schemas/AiUnavailableError'
                discriminator:
                  propertyName: error

  /healthz:
    get:
      summary: Liveness probe
      operationId: healthz
      responses:
        '200':
          description: Worker is up
          content:
            application/json:
              schema:
                type: object
                required: [status]
                properties:
                  status:
                    type: string
                    enum: [ok]

components:
  schemas:
    CareerIndustry:
      type: string
      enum:
        - tech_software
        - healthcare
        - finance_banking
        - education
        - retail_ecommerce
        - manufacturing
        - government
        - student
        - retired
        - other

    FinancialProfile:
      type: string
      enum:
        - salaried
        - freelancer
        - active_investor
        - business_owner
        - debt_payoff
        - student_no_income

    HousingLifeStage:
      type: string
      enum:
        - renter
        - homeowner
        - parent_young_kids
        - parent_teens
        - single_no_dependents
        - caretaker_elders

    Persona:
      type: object
      required: [careerIndustry, financialProfile, housingLifeStage]
      additionalProperties: false
      properties:
        careerIndustry:
          $ref: '#/components/schemas/CareerIndustry'
        financialProfile:
          $ref: '#/components/schemas/FinancialProfile'
        housingLifeStage:
          $ref: '#/components/schemas/HousingLifeStage'

    GenerateImpactRequest:
      type: object
      required: [persona]
      additionalProperties: false
      properties:
        persona:
          $ref: '#/components/schemas/Persona'

    PersonalizedImpactItem:
      type: object
      required:
        - personalized
        - originalHeadline
        - originalUrl
        - source
        - impactHeadline
        - impactSummary
      additionalProperties: false
      properties:
        personalized:
          type: boolean
          enum: [true]
        originalHeadline:
          type: string
          minLength: 1
          maxLength: 300
        originalUrl:
          type: string
          format: uri
        source:
          type: string
          minLength: 1
          maxLength: 120
        impactHeadline:
          type: string
          maxLength: 200
          description: 10–15 words, persona-tailored framing
        impactSummary:
          type: string
          maxLength: 500
          description: 1–3 sentences explaining personal impact

    FallbackImpactItem:
      type: object
      required:
        - personalized
        - originalHeadline
        - originalUrl
        - source
        - fallbackReason
      additionalProperties: false
      properties:
        personalized:
          type: boolean
          enum: [false]
        originalHeadline:
          type: string
          minLength: 1
          maxLength: 300
        originalUrl:
          type: string
          format: uri
        source:
          type: string
          minLength: 1
          maxLength: 120
        fallbackReason:
          type: string
          enum:
            - ai_timeout
            - ai_invalid_output
            - ai_error

    ImpactNewsItem:
      oneOf:
        - $ref: '#/components/schemas/PersonalizedImpactItem'
        - $ref: '#/components/schemas/FallbackImpactItem'
      discriminator:
        propertyName: personalized
        mapping:
          'true': '#/components/schemas/PersonalizedImpactItem'
          'false': '#/components/schemas/FallbackImpactItem'

    GenerateImpactResponse:
      type: object
      required: [generatedAt, corpusDate, newsItems]
      additionalProperties: false
      properties:
        generatedAt:
          type: string
          format: date-time
        corpusDate:
          type: string
          pattern: '^\d{4}-\d{2}-\d{2}$'
          description: UTC calendar date of the news corpus used
        newsItems:
          type: array
          minItems: 1
          maxItems: 5
          items:
            $ref: '#/components/schemas/ImpactNewsItem'

    ValidationIssue:
      type: object
      required: [path, message]
      additionalProperties: false
      properties:
        path:
          type: string
        message:
          type: string

    ValidationFailedError:
      type: object
      required: [error, message]
      additionalProperties: false
      properties:
        error:
          type: string
          enum: [validation_failed]
        message:
          type: string
        issues:
          type: array
          items:
            $ref: '#/components/schemas/ValidationIssue'

    RateLimitedError:
      type: object
      required: [error, message, retryAfterSeconds]
      additionalProperties: false
      properties:
        error:
          type: string
          enum: [rate_limited]
        message:
          type: string
        retryAfterSeconds:
          type: integer
          minimum: 0

    NewsUnavailableError:
      type: object
      required: [error, message]
      additionalProperties: false
      properties:
        error:
          type: string
          enum: [news_unavailable]
        message:
          type: string

    AiUnavailableError:
      type: object
      required: [error, message]
      additionalProperties: false
      properties:
        error:
          type: string
          enum: [ai_unavailable]
        message:
          type: string

    InternalError:
      type: object
      required: [error, message]
      additionalProperties: false
      properties:
        error:
          type: string
          enum: [internal_error]
        message:
          type: string
        requestId:
          type: string
